<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teclado MIDI Online Avançado</title>
    <!-- Tailwind CSS para estilização rápida e responsiva -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Soundfont Player para carregar samples de timbres reais General MIDI -->
    <script src="https://unpkg.com/soundfont-player/dist/soundfont-player.min.js"></script>
    <!-- Lucide Icons para os botões -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            background-color: #0f172a; /* Slate 900 */
            color: white; 
            user-select: none;
            overflow-x: hidden;
        }

        /* Estilização específica do container do piano para scroll */
        .piano-container {
            display: flex;
            background: #1e293b; /* Slate 800 */
            padding: 24px 24px 0 24px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 2px 4px rgba(255,255,255,0.05);
            overflow-x: auto;
            border: 1px solid #334155;
            scrollbar-width: thin;
            scrollbar-color: #475569 #1e293b;
        }

        .piano-container::-webkit-scrollbar { height: 14px; }
        .piano-container::-webkit-scrollbar-track { background: #1e293b; border-radius: 0 0 16px 16px; }
        .piano-container::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; border: 3px solid #1e293b; }
        .piano-container::-webkit-scrollbar-thumb:hover { background: #64748b; }

        /* Teclas Brancas */
        .white {
            width: 54px; height: 240px;
            background: #f8fafc; border: 1px solid #cbd5e1; border-radius: 0 0 6px 6px;
            cursor: pointer; box-shadow: inset 0 -4px 6px rgba(0,0,0,0.1), 0 4px 6px rgba(0,0,0,0.3);
            transition: all 0.05s ease; position: relative; z-index: 1;
        }
        .white.active {
            background: #e2e8f0; box-shadow: inset 0 -2px 4px rgba(0,0,0,0.2), 0 1px 2px rgba(0,0,0,0.4);
            transform: perspective(500px) rotateX(2deg) translateY(2px);
        }

        /* Teclas Pretas */
        .black {
            width: 34px; height: 150px;
            background: linear-gradient(to bottom, #334155 0%, #0f172a 100%);
            border-radius: 0 0 4px 4px; cursor: pointer;
            box-shadow: inset 0 -2px 4px rgba(255,255,255,0.1), 2px 4px 6px rgba(0,0,0,0.6);
            z-index: 10; transition: all 0.05s ease; position: absolute; top: 0; right: -17px; 
        }
        .black.active {
            background: linear-gradient(to bottom, #1e293b 0%, #020617 100%);
            box-shadow: inset 0 -1px 2px rgba(255,255,255,0.05), 1px 2px 3px rgba(0,0,0,0.8);
            transform: perspective(500px) rotateX(2deg) translateY(2px);
        }

        /* Elementos de Formulário UI */
        select, button, input[type="range"] {
            background-color: #334155; border: 1px solid #475569; color: #f8fafc;
            transition: background 0.2s, border-color 0.2s;
        }
        select:hover, button:hover { background-color: #475569; border-color: #64748b; }
        select:focus { outline: 2px solid #3b82f6; outline-offset: -1px; }
        button:active { transform: translateY(1px); }

        /* Estilo para Range Sliders */
        input[type=range] {
            -webkit-appearance: none; width: 100%; height: 6px; border-radius: 3px; outline: none; padding: 0; border: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none; width: 16px; height: 16px; border-radius: 50%;
            background: #3b82f6; cursor: pointer; transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
        
        input[type=range]:disabled { opacity: 0.6; cursor: not-allowed; }
        input[type=range]:disabled::-webkit-slider-thumb { background: #94a3b8; transform: none; }

        /* Animação de colapso do painel */
        .collapsible { transition: max-height 0.4s ease-in-out, opacity 0.3s ease-in-out; overflow: hidden; }
        .collapsed { max-height: 0; opacity: 0; margin-top: 0 !important; margin-bottom: 0 !important; padding-top: 0 !important; padding-bottom: 0 !important; border: none !important;}
    </style>
</head>
<body class="flex flex-col items-center min-h-screen py-6 font-sans">

                <!-- Timbre A -->

                    <select id="instrument-a" class="w-full p-2 text-sm rounded appearance-none cursor-pointer border-cyan-700/50"></select>

        let outputPort = null;

        const keyMap = {

        };

        const gmInstruments = [

            "Sino de Funileiro", "Agogô", "Tambores de Aço", "Bloco de Madeira", "Taiko", "Tom Melódico", "Tambor Sintético", "Prato Reverso",

        ];

        const sfNames = [
            "acoustic_grand_piano", "bright_acoustic_piano", "electric_grand_piano", "honkytonk_piano", "electric_piano_1", "electric_piano_2", "harpsichord", "clavi",
            "celesta", "glockenspiel", "music_box", "vibraphone", "marimba", "xylophone", "tubular_bells", "dulcimer",
            "drawbar_organ", "percussive_organ", "rock_organ", "church_organ", "reed_organ", "accordion", "harmonica", "tango_accordion",
            "acoustic_guitar_nylon", "acoustic_guitar_steel", "electric_guitar_jazz", "electric_guitar_clean", "electric_guitar_muted", "overdriven_guitar", "distortion_guitar", "guitar_harmonics",
            "acoustic_bass", "electric_bass_finger", "electric_bass_pick", "fretless_bass", "slap_bass_1", "slap_bass_2", "synth_bass_1", "synth_bass_2",
            "violin", "viola", "cello", "contrabass", "tremolo_strings", "pizzicato_strings", "orchestral_harp", "timpani",
            "string_ensemble_1", "string_ensemble_2", "synthstrings_1", "synthstrings_2", "choir_aahs", "voice_oohs", "synth_voice", "orchestral_hit",
            "trumpet", "trombone", "tuba", "muted_trumpet", "french_horn", "brass_section", "synthbrass_1", "synthbrass_2",
            "soprano_sax", "alto_sax", "tenor_sax", "baritone_sax", "oboe", "english_horn", "bassoon", "clarinet",
            "piccolo", "flute", "recorder", "pan_flute", "blown_bottle", "shakuhachi", "whistle", "ocarina",
            "lead_1_square", "lead_2_sawtooth", "lead_3_calliope", "lead_4_chiff", "lead_5_charang", "lead_6_voice", "lead_7_fifths", "lead_8_bass_lead",
            "pad_1_new_age", "pad_2_warm", "pad_3_polysynth", "pad_4_choir", "pad_5_bowed", "pad_6_metallic", "pad_7_halo", "pad_8_sweep",
            "fx_1_rain", "fx_2_soundtrack", "fx_3_crystal", "fx_4_atmosphere", "fx_5_brightness", "fx_6_goblins", "fx_7_echoes", "fx_8_scifi",
            "sitar", "banjo", "shamisen", "koto", "kalimba", "bagpipe", "fiddle", "shanai",
            "tinkle_bell", "agogo", "steel_drums", "woodblock", "taiko_drum", "melodic_tom", "synth_drum", "reverse_cymbal",
            "guitar_fret_noise", "breath_noise", "seashore", "bird_tweet", "telephone_ring", "helicopter", "applause", "gunshot"
        ];

        const drumKits = [
            { name: "Standard Kit", pc: 0 }, { name: "Room Kit", pc: 8 }, { name: "Power Kit", pc: 16 },
            { name: "Electronic Kit", pc: 24 }, { name: "TR-808 Kit", pc: 25 }, { name: "Jazz Kit", pc: 32 }
        ];

        // --- 2. RENDERIZAÇÃO DO PIANO E UI MINIMIZÁVEL ---
        
        // Alternar Visibilidade da UI
        const toggleBtn = document.getElementById('toggle-ui-btn');
        const controlPanel = document.getElementById('control-panel');
        let uiVisible = true;

        toggleBtn.addEventListener('click', () => {
            uiVisible = !uiVisible;
            if (uiVisible) {
                controlPanel.classList.remove('collapsed');
                toggleBtn.innerHTML = '<i data-lucide="minimize-2" class="w-4 h-4"></i> Ocultar Controles';
            } else {
                controlPanel.classList.add('collapsed');
                toggleBtn.innerHTML = '<i data-lucide="maximize-2" class="w-4 h-4"></i> Mostrar Controles';
            }
            lucide.createIcons();
        });

        const pianoContainer = document.getElementById('piano');
        let pianoHTML = '';
        for (let i = startNote; i <= endNote; i++) {
            const isBlack = [1, 3, 6, 8, 10].includes(i % 12);
            if (!isBlack) {
                const nextIsBlack = [1, 3, 6, 8, 10].includes((i + 1) % 12);
                let blackHTML = '';
                if (nextIsBlack && (i + 1) <= endNote) {
                     blackHTML = `<div class="key black" data-note="${i+1}"></div>`;
                }
                pianoHTML += `
                    <div class="relative flex-none">
                        <div class="key white" data-note="${i}"><span class="absolute bottom-4 w-full text-center text-[10px] opacity-40 font-bold text-slate-800 pointer-events-none"></span></div>
                        ${blackHTML}
                    </div>`;
            }
        }
        pianoContainer.innerHTML = pianoHTML;

        function updateLabels() {
            document.querySelectorAll('.key.white').forEach(keyEl => {
                const note = parseInt(keyEl.dataset.note);
                const baseNote = (currentOctave + 1) * 12;
                let label = '';
                for (const [key, offset] of Object.entries(keyMap)) {
                    if (baseNote + offset === note) {
                        label = key.replace('Key', '').replace('Digit', '').replace('Comma', ',').replace('Period', '.');
                        break;
                    }
                }
                const span = keyEl.querySelector('span');
                if (span) span.textContent = label;
            });
            document.getElementById('oct-display').textContent = currentOctave;
        }
        updateLabels();
        setTimeout(() => {
            const middleC = document.querySelector('.key[data-note="60"]');
            if (middleC) middleC.scrollIntoView({ behavior: 'smooth', inline: 'center' });
        }, 300);

        // --- 3. ÁUDIO WEB (REVERB, EFEITOS E TIMBRES) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        
        // Nodos Globais
        let masterGain, reverbNode, dryGain, wetGain;
        let modLFO, modGain, tremoloNode; // Nodos para o Mod Wheel (Vibrato/Tremolo)

        // Estado dos Instrumentos Carregados
        const loadedSF = {}; // Cache de Soundfonts: { programNumber: sfInstance }
        let activeNotesA = {};
        let activeNotesB = {};
        let activeDrumNotes = {};

        // Cria Resposta a Impulso Sintética para o Reverb
        function createReverbImpulse(context, duration = 2.0, decay = 2.0) {
            const rate = context.sampleRate;
            const length = rate * duration;
            const impulse = context.createBuffer(2, length, rate);
            const impulseL = impulse.getChannelData(0);
            const impulseR = impulse.getChannelData(1);
            for (let i = 0; i < length; i++) {
                const n = 1 - i / length;
                impulseL[i] = (Math.random() * 2 - 1) * Math.pow(n, decay);
                impulseR[i] = (Math.random() * 2 - 1) * Math.pow(n, decay);
            }
            return impulse;
        }

        function initAudioEngine() {
            if (audioCtx) return;
            audioCtx = new AudioContext();

            // Configuração do Tremolo (Mod Wheel Effect)
            modLFO = audioCtx.createOscillator();
            modLFO.frequency.value = 5.5; // Oscilação em Hz
            modGain = audioCtx.createGain();
            modGain.gain.value = 0; // Começa sem profundidade
            modLFO.connect(modGain);

            tremoloNode = audioCtx.createGain();
            tremoloNode.gain.value = 1.0;
            modGain.connect(tremoloNode.gain); // Modula o ganho base
            modLFO.start();

            // Setup Base
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 1.0;
            masterGain.connect(tremoloNode); // Sinal passa pelo Tremolo

            // Setup do Reverb
            reverbNode = audioCtx.createConvolver();
            reverbNode.buffer = createReverbImpulse(audioCtx, 2.5, 3.0);
            
            dryGain = audioCtx.createGain();
            wetGain = audioCtx.createGain();
            
            dryGain.gain.value = 1.0;
            wetGain.gain.value = state.reverb; 

            // Roteamento Final
            tremoloNode.connect(dryGain);
            tremoloNode.connect(reverbNode);
            reverbNode.connect(wetGain);
            
            dryGain.connect(audioCtx.destination);
            wetGain.connect(audioCtx.destination);
        }

        async function loadLayerSound(progNum) {
            if (!audioCtx) initAudioEngine();
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            
            if (progNum >= 128) return true; // Bateria usa síntese nativa
            if (loadedSF[progNum]) return true; // Já baixado

            setStatus(`Baixando timbre ${progNum}...`, 'loading');
            try {
                // Instancia o Soundfont apontando para o nosso nó Master
                const inst = await Soundfont.instrument(audioCtx, sfNames[progNum], { 
                    soundfont: 'MusyngKite',
                    destination: masterGain
                });
                loadedSF[progNum] = inst;
                setStatus('Timbres Prontos', 'ok');
                return true;
            } catch (e) {
                console.error("Erro ao carregar sf", e);
                setStatus('Erro no timbre', 'error');
                return false;
            }
        }

        // --- SISTEMA DE BATERIA ---
        function playNoise(time, filterType, freq, decay, gainValue = 1) {
            const bufferSize = audioCtx.sampleRate * decay;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const filter = audioCtx.createBiquadFilter();
            filter.type = filterType; filter.frequency.value = freq;
            const gainNode = audioCtx.createGain();
            
            noise.connect(filter); filter.connect(gainNode);
            gainNode.connect(masterGain); 
            
            gainNode.gain.setValueAtTime(gainValue, time);
            gainNode.gain.exponentialRampToValueAtTime(0.01, time + decay);
            noise.start(time);
        }

        function playSynthDrum(note, velocity = 100) {
            if (!audioCtx) return;
            const time = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(masterGain);

            const vGain = velocity / 127;

            if (note === 35 || note === 36) { // Kick
                osc.type = 'sine'; osc.frequency.setValueAtTime(150, time);
                osc.frequency.exponentialRampToValueAtTime(0.01, time + 0.5);
                gain.gain.setValueAtTime(1.5 * vGain, time); gain.gain.exponentialRampToValueAtTime(0.01, time + 0.5);
                osc.start(time); osc.stop(time + 0.5);
            } else if (note === 38 || note === 40) { // Snare
                osc.type = 'triangle'; osc.frequency.setValueAtTime(250, time);
                osc.frequency.exponentialRampToValueAtTime(100, time + 0.2);
                gain.gain.setValueAtTime(0.8 * vGain, time); gain.gain.exponentialRampToValueAtTime(0.01, time + 0.2);
                osc.start(time); osc.stop(time + 0.2);
                playNoise(time, 'highpass', 2000, 0.25, 0.6 * vGain); 
            } else if (note === 42 || note === 44) { playNoise(time, 'bandpass', 8000, 0.1, 0.8 * vGain); } // HH Closed
            else if (note === 46) { playNoise(time, 'bandpass', 8000, 0.4, 0.8 * vGain); } // HH Open
            else { playNoise(time, 'highpass', 4000, 0.8, 0.7 * vGain); } // Crash/Ride/Outros
        }

        // --- ROTEADOR PRINCIPAL DE NOTAS ---
        function triggerLayer(layerKey, note, velocity) {
            const prog = layerKey === 'A' ? state.progA : state.progB;
            const vol = layerKey === 'A' ? state.volA : state.volB;
            const activeNotesDict = layerKey === 'A' ? activeNotesA : activeNotesB;
            
            const finalGain = vol * (velocity / 127);

            if (prog >= 128) {
                playSynthDrum(note, velocity * vol); 
            } else {
                if (loadedSF[prog] && !activeNotesDict[note]) {
                    activeNotesDict[note] = loadedSF[prog].play(note, audioCtx.currentTime, { gain: finalGain });
                }
            }
        }

        function releaseLayer(layerKey, note) {
            const activeNotesDict = layerKey === 'A' ? activeNotesA : activeNotesB;
            if (activeNotesDict[note]) {
                activeNotesDict[note].stop(audioCtx.currentTime + 0.1);
                delete activeNotesDict[note];
            }
        }

        function playNote(note, velocity = 100) {
            if (!audioCtx) initAudioEngine();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            if (outputPort) {
                if (state.mode === 'single' || state.mode === 'layer') {
                    outputPort.send([0x90, note, velocity]); // Ch 1
                    if (state.mode === 'layer') outputPort.send([0x91, note, velocity]); // Ch 2
                } else if (state.mode === 'split') {
                    if (note >= state.splitNote) outputPort.send([0x90, note, velocity]);
                    else outputPort.send([0x91, note, velocity]);
                }
            } else {
                if (state.mode === 'single') {
                    triggerLayer('A', note, velocity);
                } else if (state.mode === 'layer') {
                    triggerLayer('A', note, velocity);
                    triggerLayer('B', note, velocity);
                } else if (state.mode === 'split') {
                    if (note >= state.splitNote) triggerLayer('A', note, velocity);
                    else triggerLayer('B', note, velocity);
                }
            }
            
            const keyEl = document.querySelector(`.key[data-note="${note}"]`);
            if (keyEl) keyEl.classList.add('active');
        }

        function stopNote(note) {
            if (outputPort) {
                outputPort.send([0x80, note, 0]);
                outputPort.send([0x81, note, 0]);
            } else {
                releaseLayer('A', note);
                releaseLayer('B', note);
            }
            const keyEl = document.querySelector(`.key[data-note="${note}"]`);
            if (keyEl) keyEl.classList.remove('active');
        }

        // --- 4. CONTROLES DE UI E EVENTOS ---

        function populateInstruments(selectId, defaultProg) {
            const select = document.getElementById(selectId);
            select.innerHTML = '';
            gmInstruments.forEach((inst, index) => {
                select.appendChild(new Option(`${String(index + 1).padStart(3, '0')} - ${inst}`, index));
            });
            const sep = new Option("── BATERIAS ──", ""); sep.disabled = true; select.appendChild(sep);
            drumKits.forEach((kit, index) => {
                select.appendChild(new Option(`Kit - ${kit.name}`, 128 + index));
            });
            select.value = defaultProg;
        }

        populateInstruments('instrument-a', state.progA);
        populateInstruments('instrument-b', state.progB);

        // Eventos dos Controles
        document.getElementById('instrument-a').addEventListener('change', (e) => {
            state.progA = parseInt(e.target.value);
            loadLayerSound(state.progA);
            if (outputPort) outputPort.send([0xC0, state.progA < 128 ? state.progA : 0]); 
        });
        
        document.getElementById('instrument-b').addEventListener('change', (e) => {
            state.progB = parseInt(e.target.value);
            if (state.mode !== 'single') loadLayerSound(state.progB);
            if (outputPort) outputPort.send([0xC1, state.progB < 128 ? state.progB : 0]); 
        });

        document.getElementById('vol-a').addEventListener('input', (e) => { state.volA = e.target.value / 100; });
        document.getElementById('vol-b').addEventListener('input', (e) => { state.volB = e.target.value / 100; });
        
        document.getElementById('reverb-slider').addEventListener('input', (e) => {
            state.reverb = e.target.value / 100;
            if (wetGain) wetGain.gain.value = state.reverb;
        });

        document.getElementById('split-point').addEventListener('change', (e) => {
            state.splitNote = parseInt(e.target.value);
        });

        // Alternância de Modos
        document.getElementById('keyboard-mode').addEventListener('change', (e) => {
            state.mode = e.target.value;
            const panelB = document.getElementById('panel-timbre-b');
            const splitCtrl = document.getElementById('split-control');
            const selB = document.getElementById('instrument-b');
            const volB = document.getElementById('vol-b');

            if (state.mode === 'single') {
                panelB.classList.add('opacity-50');
                splitCtrl.classList.add('opacity-50', 'pointer-events-none');
                selB.disabled = true; volB.disabled = true;
            } else {
                panelB.classList.remove('opacity-50');
                selB.disabled = false; volB.disabled = false;
                loadLayerSound(state.progB);
                
                if (state.mode === 'split') {
                    splitCtrl.classList.remove('opacity-50', 'pointer-events-none');
                } else {
                    splitCtrl.classList.add('opacity-50', 'pointer-events-none');
                }
            }
        });

        // --- 5. ENTRADAS DE TECLADO PC E MOUSE ---
        document.getElementById('oct-up').addEventListener('click', () => { if (currentOctave < 7) { currentOctave++; updateLabels(); } });
        document.getElementById('oct-down').addEventListener('click', () => { if (currentOctave > 1) { currentOctave--; updateLabels(); } });

        let isMouseDown = false;
        let currentMouseNote = null;
        pianoContainer.addEventListener('mousedown', (e) => {
            isMouseDown = true;
            const key = e.target.closest('.key');
            if (key) {
                const note = parseInt(key.dataset.note);
                playNote(note, 100); 
                currentMouseNote = note;
            }
        });
        pianoContainer.addEventListener('mouseover', (e) => {
            if (!isMouseDown) return;
            const key = e.target.closest('.key');
            if (key) {
                const note = parseInt(key.dataset.note);
                if (note !== currentMouseNote) {
                    if (currentMouseNote !== null) stopNote(currentMouseNote);
                    playNote(note, 100);
                    currentMouseNote = note;
                }
            }
        });
        pianoContainer.addEventListener('mouseout', (e) => {
            if (!isMouseDown) return;
            const key = e.target.closest('.key');
            if (key) {
                const note = parseInt(key.dataset.note);
                if (note === currentMouseNote) { stopNote(note); currentMouseNote = null; }
            }
        });
        window.addEventListener('mouseup', () => {
            isMouseDown = false;
            if (currentMouseNote !== null) { stopNote(currentMouseNote); currentMouseNote = null; }
        });

        const activePCNotes = new Map();
        window.addEventListener('keydown', (e) => {
            if (e.repeat || ['INPUT', 'SELECT'].includes(e.target.tagName)) return;
            const offset = keyMap[e.code];
            if (offset !== undefined) {
                const note = ((currentOctave + 1) * 12) + offset;
                if (note >= startNote && note <= endNote) {
                    playNote(note, 100);
                    activePCNotes.set(e.code, note);
                }
            }
        });
        window.addEventListener('keyup', (e) => {
            if (activePCNotes.has(e.code)) {
                stopNote(activePCNotes.get(e.code));
                activePCNotes.delete(e.code);
            }
        });

        // --- 6. MIDI API (INTERPRETANDO O TECLADO CONTROLADOR FISICO) ---
        function setStatus(msg, state) {
            document.getElementById('status-text').textContent = msg;
            document.getElementById('status-dot').className = 'w-3 h-3 rounded-full ' + (state === 'ok' ? 'bg-emerald-500' : state === 'error' ? 'bg-red-500' : 'bg-yellow-500 animate-pulse');
        }

        function onMidiMessage(msg) {
            const [status, data1, data2] = msg.data;
            const cmd = status >> 4;
            const channel = status & 0x0F;

            // 1. Note On
            if (cmd === 9 && data2 > 0) {
                playNote(data1, data2); 
            } 
            // 2. Note Off
            else if (cmd === 8 || (cmd === 9 && data2 === 0)) {
                stopNote(data1);
            }
            // 3. Control Change (CC)
            else if (cmd === 11) {
                const cc = data1;
                const val = data2;

                // Modulação (CC 1)
                if (cc === 1) {
                    state.modulation = val / 127;
                    const modSlider = document.getElementById('mod-wheel');
                    if (modSlider) modSlider.value = val;
                    if (modGain) modGain.gain.value = state.modulation * 0.5; // Aplica o Efeito Tremolo
                    
                    if (outputPort) {
                        outputPort.send([status, cc, val]);
                        if (state.mode !== 'single') outputPort.send([(0xB0 | 1), cc, val]);
                    }
                }
                // Volume Timbre A (CC 7)
                else if (cc === 7) {
                    const vol = val / 127;
                    const sliderA = document.getElementById('vol-a');
                    sliderA.value = vol * 100;
                    sliderA.dispatchEvent(new Event('input')); // Força atualização do estado
                }
                // Volume Timbre B (CC 11 - Expression / Facilita para usar com o controlador)
                else if (cc === 11) {
                    const vol = val / 127;
                    const sliderB = document.getElementById('vol-b');
                    sliderB.value = vol * 100;
                    sliderB.dispatchEvent(new Event('input')); // Força atualização do estado
                }
                // Controles de Oitava mapeados (CC 111 e CC 112)
                else if (cc === 111 && val > 64) { document.getElementById('oct-down').click(); }
                else if (cc === 112 && val > 64) { document.getElementById('oct-up').click(); }
            }
            // 4. Program Change (Mudar Timbre)
            else if (cmd === 12) {
                const prog = data1;
                if (channel === 0 || state.mode === 'single') { // Ch 1
                    document.getElementById('instrument-a').value = prog;
                    document.getElementById('instrument-a').dispatchEvent(new Event('change'));
                } else if (channel === 1) { // Ch 2
                    document.getElementById('instrument-b').value = prog;
                    document.getElementById('instrument-b').dispatchEvent(new Event('change'));
                }
            }
            // 5. Pitch Bend
            else if (cmd === 14) {
                const bend = (data2 << 7) | data1; // 0 a 16383
                state.pitchBend = bend;
                const pitchSlider = document.getElementById('pitch-wheel');
                if (pitchSlider) pitchSlider.value = bend;
                
                // Repassa o Pitch Bend para hardware externo
                if (outputPort) {
                    outputPort.send([status, data1, data2]);
                    if (state.mode !== 'single') outputPort.send([(0xE0 | 1), data1, data2]);
                }
            }
        }

        function updateDevices() {
            const selectIn = document.getElementById('midi-in-select');
            selectIn.innerHTML = '<option value="">Apenas PC/Mouse</option>';
            for (let input of midiAccess.inputs.values()) {
                selectIn.appendChild(new Option(input.name, input.id));
                if (!inputPort) { inputPort = input; inputPort.onmidimessage = onMidiMessage; selectIn.value = input.id; }
            }

            const selectOut = document.getElementById('midi-out-select');
            selectOut.innerHTML = '<option value="web-synth">Sintetizador Web</option>';
            for (let output of midiAccess.outputs.values()) {
                selectOut.appendChild(new Option(output.name, output.id));
            }
            setStatus('MIDI Conectado', 'ok');
        }

        async function initMIDI() {
            if (navigator.requestMIDIAccess) {
                try {
                    midiAccess = await navigator.requestMIDIAccess({ sysex: false });
                    updateDevices();
                    midiAccess.onstatechange = updateDevices;
                } catch (err) {
                    setStatus('Sem permissão MIDI', 'error');
                }
            } else { setStatus('MIDI não suportado', 'error'); }
            
            // Carrega o primeiro timbre por padrão
            loadLayerSound(state.progA);
        }

        document.getElementById('midi-in-select').addEventListener('change', (e) => {
            if (inputPort) inputPort.onmidimessage = null;
            inputPort = e.target.value ? midiAccess.inputs.get(e.target.value) : null;
            if (inputPort) inputPort.onmidimessage = onMidiMessage;
        });
        
        document.getElementById('midi-out-select').addEventListener('change', (e) => {
            outputPort = e.target.value !== 'web-synth' ? midiAccess.outputs.get(e.target.value) : null;
            if (outputPort) {
                outputPort.send([0xC0, state.progA < 128 ? state.progA : 0]); 
            }
        });

        // Inicializa a API
        initMIDI();

        document.body.addEventListener('click', () => {
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }, { once: true });

    </script>
</body>
