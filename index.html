<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teclado MIDI Online Avançado</title>
    <!-- Tailwind CSS para estilização rápida e responsiva -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Soundfont Player para carregar samples de timbres reais General MIDI -->
    <script src="https://unpkg.com/soundfont-player/dist/soundfont-player.min.js"></script>
    <style>
        body { 
            background-color: #0f172a; /* Slate 900 */
            color: white; 
            user-select: none;
            overflow-x: hidden;
        }

        /* Estilização específica do container do piano para scroll */
        .piano-container {
            display: flex;
            background: #1e293b; /* Slate 800 */
            padding: 24px 24px 0 24px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 2px 4px rgba(255,255,255,0.05);
            overflow-x: auto;
            border: 1px solid #334155;
            scrollbar-width: thin;
            scrollbar-color: #475569 #1e293b;
        }

        .piano-container::-webkit-scrollbar { height: 14px; }
        .piano-container::-webkit-scrollbar-track { background: #1e293b; border-radius: 0 0 16px 16px; }
        .piano-container::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; border: 3px solid #1e293b; }
        .piano-container::-webkit-scrollbar-thumb:hover { background: #64748b; }

        /* Teclas Brancas */
        .white {
            width: 54px; height: 240px;
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 0 0 6px 6px;
            cursor: pointer;
            box-shadow: inset 0 -4px 6px rgba(0,0,0,0.1), 0 4px 6px rgba(0,0,0,0.3);
            transition: all 0.05s ease;
            position: relative; z-index: 1;
        }
        .white.active {
            background: #e2e8f0;
            box-shadow: inset 0 -2px 4px rgba(0,0,0,0.2), 0 1px 2px rgba(0,0,0,0.4);
            transform: perspective(500px) rotateX(2deg) translateY(2px);
        }

        /* Teclas Pretas */
        .black {
            width: 34px; height: 150px;
            background: linear-gradient(to bottom, #334155 0%, #0f172a 100%);
            border-radius: 0 0 4px 4px;
            cursor: pointer;
            box-shadow: inset 0 -2px 4px rgba(255,255,255,0.1), 2px 4px 6px rgba(0,0,0,0.6);
            z-index: 10;
            transition: all 0.05s ease;
            position: absolute; top: 0; right: -17px; 
        }
        .black.active {
            background: linear-gradient(to bottom, #1e293b 0%, #020617 100%);
            box-shadow: inset 0 -1px 2px rgba(255,255,255,0.05), 1px 2px 3px rgba(0,0,0,0.8);
            transform: perspective(500px) rotateX(2deg) translateY(2px);
        }

        /* Elementos de Formulário UI */
        select, button, input[type="range"] {
            background-color: #334155; border: 1px solid #475569; color: #f8fafc;
            transition: background 0.2s, border-color 0.2s;
        }
        select:hover, button:hover { background-color: #475569; border-color: #64748b; }
        select:focus { outline: 2px solid #3b82f6; outline-offset: -1px; }
        button:active { transform: translateY(1px); }
        
        /* Slider Customizado */
        input[type=range] {
            -webkit-appearance: none; width: 100%; border: none; height: 6px; border-radius: 3px; background: #475569; padding: 0;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: #3b82f6; cursor: pointer;
        }
        
        /* Switch Customizado */
        .toggle-checkbox:checked { right: 0; border-color: #3b82f6; }
        .toggle-checkbox:checked + .toggle-label { background-color: #3b82f6; }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen py-10 font-sans">

    <div class="max-w-7xl w-full mx-auto px-4 flex flex-col gap-6">
        
        <!-- Cabeçalho e Status -->
        <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-blue-500">
                    Teclado MIDI Online Avançado
                </h1>
                <p class="text-slate-400 text-sm mt-1">
                    Com Reverb, Layers (Dual Timbre) e sensibilidade (Velocity).
                </p>
            </div>
            <div id="status-indicator" class="flex items-center gap-3 bg-slate-800 px-4 py-2.5 rounded-full border border-slate-700 shadow-lg">
                <div id="status-dot" class="w-3.5 h-3.5 rounded-full bg-yellow-500 animate-pulse"></div>
                <span id="status-text" class="text-sm font-medium text-slate-300">Aguardando interação...</span>
            </div>
        </div>

        <!-- Barra de Controles -->
        <div class="bg-slate-800/50 p-5 rounded-xl border border-slate-700/50 flex flex-wrap gap-5 items-end backdrop-blur-sm shadow-xl">
            <!-- Conexões MIDI -->
            <div class="flex-1 min-w-[200px] border-r border-slate-700/50 pr-4">
                <div class="space-y-3">
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 mb-1 uppercase tracking-wider">Entrada (Teclado Externo)</label>
                        <select id="midi-in-select" class="w-full p-2 rounded-lg text-sm appearance-none cursor-pointer">
                            <option value="">Nenhum / Apenas QWERTY</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 mb-1 uppercase tracking-wider">Saída MIDI</label>
                        <select id="midi-out-select" class="w-full p-2 rounded-lg text-sm appearance-none cursor-pointer">
                            <option value="web-synth">Sintetizador Web (Padrão)</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Timbres / Layers -->
            <div class="flex-[2] min-w-[280px] flex flex-col gap-3">
                <div class="flex items-center gap-2">
                    <label class="block text-xs font-bold text-cyan-400 uppercase tracking-wider w-16">Timbre 1</label>
                    <select id="instrument-select-1" class="flex-1 p-2 rounded-lg text-sm appearance-none cursor-pointer border-cyan-700/50"></select>
                </div>
                
                <div class="flex items-center gap-2">
                    <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                        <input type="checkbox" name="toggle" id="layer2-toggle" class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 border-slate-600 appearance-none cursor-pointer transition-all duration-300 z-10 top-0 left-0"/>
                        <label for="layer2-toggle" class="toggle-label block overflow-hidden h-5 rounded-full bg-slate-600 cursor-pointer transition-all duration-300"></label>
                    </div>
                    <label class="block text-xs font-bold text-blue-400 uppercase tracking-wider w-16">Timbre 2</label>
                    <select id="instrument-select-2" class="flex-1 p-2 rounded-lg text-sm appearance-none cursor-pointer border-blue-700/50 opacity-50 pointer-events-none transition-opacity" disabled></select>
                </div>
            </div>

            <!-- Efeitos e Oitava -->
            <div class="flex-1 min-w-[200px] flex flex-col gap-4 pl-4 border-l border-slate-700/50">
                <div class="flex flex-col">
                    <div class="flex justify-between items-center mb-1">
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider">Reverb</label>
                        <span id="reverb-val-display" class="text-xs text-slate-500">30%</span>
                    </div>
                    <input type="range" id="reverb-slider" min="0" max="1" step="0.01" value="0.3" class="mt-2">
                </div>
                
                <div class="flex items-center justify-between">
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider">Oitava (<span id="oct-display" class="text-white">4</span>)</label>
                    <div class="flex gap-1">
                        <button id="oct-down" class="px-3 py-1 rounded bg-slate-700 hover:bg-slate-600 font-bold leading-none">-</button>
                        <button id="oct-up" class="px-3 py-1 rounded bg-slate-700 hover:bg-slate-600 font-bold leading-none">+</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Container do Piano (Gerado via JS) -->
        <div id="piano" class="piano-container pb-4 relative">
            <!-- As teclas serão renderizadas aqui -->
        </div>

        <!-- Instruções -->
        <div class="text-slate-500 text-sm flex justify-between items-start mt-2">
            <p><strong>Dica de uso:</strong> Toque com um Teclado MIDI externo (reconhece velocity), Mouse, ou <strong>Teclado do PC</strong> (Z/X/C/V... e Q/W/E/R...).</p>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURAÇÕES E DADOS GERAIS ---
        let midiAccess = null;
        let outputPort = null;
        let inputPort = null;
        let currentOctave = 4;
        
        // Estado Layer 1
        let currentProgram1 = 0; 
        let channelIndex1 = 0; // 0 = Ch1 (Melódico), 9 = Ch10 (Bateria)
        
        // Estado Layer 2 (Dual Timbre)
        let isLayer2Enabled = false;
        let currentProgram2 = 48; // Padrão: Strings para fazer cama
        let channelIndex2 = 1; // 1 = Ch2 (Melódico), 10 = Ch11 (Bateria)

        const startNote = 21; // A0
        const endNote = 108;  // C8

        const keyMap = {
            'KeyZ': -12, 'KeyS': -11, 'KeyX': -10, 'KeyD': -9, 'KeyC': -8, 'KeyV': -7,
            'KeyG': -6, 'KeyB': -5, 'KeyH': -4, 'KeyN': -3, 'KeyJ': -2, 'KeyM': -1,
            'Comma': 0, 'KeyL': 1, 'Period': 2, 'Semicolon': 3, 'Slash': 4,
            'KeyQ': 0, 'Digit2': 1, 'KeyW': 2, 'Digit3': 3, 'KeyE': 4, 'KeyR': 5,
            'Digit5': 6, 'KeyT': 7, 'Digit6': 8, 'KeyY': 9, 'Digit7': 10, 'KeyU': 11,
            'KeyI': 12, 'Digit9': 13, 'KeyO': 14, 'Digit0': 15, 'KeyP': 16
        };

        const gmInstruments = [
            "Piano Acústico", "Piano Brilhante", "Piano Elétrico Grand", "Piano Honky-tonk", "Piano Elétrico 1", "Piano Elétrico 2", "Cravo", "Clavinete",
            "Celesta", "Glockenspiel", "Caixa de Música", "Vibrafone", "Marimba", "Xilofone", "Sinos Tubulares", "Dulcimer",
            "Órgão Drawbar", "Órgão Percussivo", "Órgão de Rock", "Órgão de Tubos", "Órgão de Palhetas", "Acordeão", "Gaita", "Acordeão de Tango",
            "Violão (Nylon)", "Violão (Aço)", "Guitarra (Jazz)", "Guitarra (Limpa)", "Guitarra (Mutada)", "Guitarra (Overdrive)", "Guitarra (Distorção)", "Harmônicos de Guitarra",
            "Baixo Acústico", "Baixo Elétrico (Dedo)", "Baixo Elétrico (Palheta)", "Baixo Fretless", "Baixo Slap 1", "Baixo Slap 2", "Baixo Sintético 1", "Baixo Sintético 2",
            "Violino", "Viola", "Violoncelo", "Contrabaixo", "Cordas em Tremolo", "Cordas em Pizzicato", "Harpa Orquestral", "Tímpano",
            "Conjunto de Cordas 1", "Conjunto de Cordas 2", "Cordas Sintéticas 1", "Cordas Sintéticas 2", "Coro Aahs", "Voz Oohs", "Voz Sintética", "Hit Orquestral",
            "Trompete", "Trombone", "Tuba", "Trompete com Surdina", "Trompa", "Seção de Metais", "Metais Sintéticos 1", "Metais Sintéticos 2",
            "Saxofone Soprano", "Saxofone Alto", "Saxofone Tenor", "Saxofone Barítono", "Oboé", "Corne Inglês", "Fagote", "Clarinete",
            "Flautim", "Flauta Transversal", "Flauta Doce", "Flauta de Pã", "Garrafa Soprada", "Shakuhachi", "Apito", "Ocarina",
            "Lead 1 (Square)", "Lead 2 (Sawtooth)", "Lead 3 (Calliope)", "Lead 4 (Chiff)", "Lead 5 (Charang)", "Lead 6 (Voice)", "Lead 7 (Fifths)", "Lead 8 (Bass+Lead)",
            "Pad 1 (New Age)", "Pad 2 (Warm)", "Pad 3 (Polysynth)", "Pad 4 (Choir)", "Pad 5 (Bowed)", "Pad 6 (Metallic)", "Pad 7 (Halo)", "Pad 8 (Sweep)",
            "Efeito 1 (Chuva)", "Efeito 2 (Trilha Sonora)", "Efeito 3 (Cristal)", "Efeito 4 (Atmosfera)", "Efeito 5 (Brilho)", "Efeito 6 (Goblins)", "Efeito 7 (Ecos)", "Efeito 8 (Ficção Científica)",
            "Sitar", "Banjo", "Shamisen", "Koto", "Kalimba", "Gaita de Foles", "Rabeca", "Shanai",
            "Sino de Funileiro", "Agogô", "Tambores de Aço", "Bloco de Madeira", "Taiko", "Tom Melódico", "Tambor Sintético", "Prato Reverso",
            "Ruído de Traste", "Respiração", "Ondas do Mar", "Canto de Pássaro", "Toque de Telefone", "Helicóptero", "Aplausos", "Tiro de Pistola"
        ];

        const sfNames = [
            "acoustic_grand_piano", "bright_acoustic_piano", "electric_grand_piano", "honkytonk_piano", "electric_piano_1", "electric_piano_2", "harpsichord", "clavi",
            "celesta", "glockenspiel", "music_box", "vibraphone", "marimba", "xylophone", "tubular_bells", "dulcimer",
            "drawbar_organ", "percussive_organ", "rock_organ", "church_organ", "reed_organ", "accordion", "harmonica", "tango_accordion",
            "acoustic_guitar_nylon", "acoustic_guitar_steel", "electric_guitar_jazz", "electric_guitar_clean", "electric_guitar_muted", "overdriven_guitar", "distortion_guitar", "guitar_harmonics",
            "acoustic_bass", "electric_bass_finger", "electric_bass_pick", "fretless_bass", "slap_bass_1", "slap_bass_2", "synth_bass_1", "synth_bass_2",
            "violin", "viola", "cello", "contrabass", "tremolo_strings", "pizzicato_strings", "orchestral_harp", "timpani",
            "string_ensemble_1", "string_ensemble_2", "synthstrings_1", "synthstrings_2", "choir_aahs", "voice_oohs", "synth_voice", "orchestral_hit",
            "trumpet", "trombone", "tuba", "muted_trumpet", "french_horn", "brass_section", "synthbrass_1", "synthbrass_2",
            "soprano_sax", "alto_sax", "tenor_sax", "baritone_sax", "oboe", "english_horn", "bassoon", "clarinet",
            "piccolo", "flute", "recorder", "pan_flute", "blown_bottle", "shakuhachi", "whistle", "ocarina",
            "lead_1_square", "lead_2_sawtooth", "lead_3_calliope", "lead_4_chiff", "lead_5_charang", "lead_6_voice", "lead_7_fifths", "lead_8_bass_lead",
            "pad_1_new_age", "pad_2_warm", "pad_3_polysynth", "pad_4_choir", "pad_5_bowed", "pad_6_metallic", "pad_7_halo", "pad_8_sweep",
            "fx_1_rain", "fx_2_soundtrack", "fx_3_crystal", "fx_4_atmosphere", "fx_5_brightness", "fx_6_goblins", "fx_7_echoes", "fx_8_scifi",
            "sitar", "banjo", "shamisen", "koto", "kalimba", "bagpipe", "fiddle", "shanai",
            "tinkle_bell", "agogo", "steel_drums", "woodblock", "taiko_drum", "melodic_tom", "synth_drum", "reverse_cymbal",
            "guitar_fret_noise", "breath_noise", "seashore", "bird_tweet", "telephone_ring", "helicopter", "applause", "gunshot"
        ];

        const drumKits = [
            { name: "Standard Kit", pc: 0 }, { name: "Room Kit", pc: 8 }, { name: "Power Kit", pc: 16 },
            { name: "Electronic Kit", pc: 24 }, { name: "TR-808 Kit", pc: 25 }, { name: "Jazz Kit", pc: 32 },
            { name: "Brush Kit", pc: 40 }, { name: "Orchestra Kit", pc: 48 }, { name: "SFX Kit", pc: 56 }
        ];

        // --- 2. ÁUDIO WEB, EFFECTS (REVERB) & INSTRUMENTS ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        let masterGain, dryGain, wetGain, reverbNode;
        let isAudioInit = false;

        let sfInst1 = null;
        let sfInst2 = null;
        let activeSfNotes1 = {};
        let activeSfNotes2 = {};

        function initAudioEngine() {
            if (isAudioInit) return;
            audioCtx = new AudioContext();
            
            // Nodes de roteamento e efeitos
            masterGain = audioCtx.createGain();
            dryGain = audioCtx.createGain();
            wetGain = audioCtx.createGain();
            reverbNode = audioCtx.createConvolver();

            // Gerador Simples de Impulse Response (Simula uma sala de Reverb sem precisar baixar arquivo externo)
            const sampleRate = audioCtx.sampleRate;
            const length = sampleRate * 2.5; // 2.5 segundos de cauda
            const impulse = audioCtx.createBuffer(2, length, sampleRate);
            const left = impulse.getChannelData(0);
            const right = impulse.getChannelData(1);
            for (let i = 0; i < length; i++) {
                const decay = Math.pow(1 - i / length, 4); // Cauda exponencial
                left[i] = (Math.random() * 2 - 1) * decay;
                right[i] = (Math.random() * 2 - 1) * decay;
            }
            reverbNode.buffer = impulse;

            // Conexões: Synth -> Master -> (Dry + Wet) -> Saída
            masterGain.connect(dryGain);
            masterGain.connect(reverbNode);
            reverbNode.connect(wetGain);
            dryGain.connect(audioCtx.destination);
            wetGain.connect(audioCtx.destination);

            setReverbLevel(parseFloat(document.getElementById('reverb-slider').value));
            isAudioInit = true;
        }

        function setReverbLevel(val) {
            if (!isAudioInit) return;
            wetGain.gain.value = val * 1.5; // Ajuste de intensidade wet
            dryGain.gain.value = 1 - (val * 0.3); // Compensa o dry levemente
            document.getElementById('reverb-val-display').innerText = Math.round(val * 100) + '%';
        }

        document.getElementById('reverb-slider').addEventListener('input', (e) => setReverbLevel(e.target.value));

        // Dados Bateria
        const drumSamplesURLs = {
            kick: 'https://cdn.jsdelivr.net/gh/wesbos/JavaScript30@master/01%20-%20JavaScript%20Drum%20Kit/sounds/kick.wav',
            snare: 'https://cdn.jsdelivr.net/gh/wesbos/JavaScript30@master/01%20-%20JavaScript%20Drum%20Kit/sounds/snare.wav',
            hihat: 'https://cdn.jsdelivr.net/gh/wesbos/JavaScript30@master/01%20-%20JavaScript%20Drum%20Kit/sounds/hihat.wav',
            openhat: 'https://cdn.jsdelivr.net/gh/wesbos/JavaScript30@master/01%20-%20JavaScript%20Drum%20Kit/sounds/openhat.wav',
            ride: 'https://cdn.jsdelivr.net/gh/wesbos/JavaScript30@master/01%20-%20JavaScript%20Drum%20Kit/sounds/ride.wav',
            crash: 'https://cdn.jsdelivr.net/gh/wesbos/JavaScript30@master/01%20-%20JavaScript%20Drum%20Kit/sounds/crash.wav',
            tom: 'https://cdn.jsdelivr.net/gh/wesbos/JavaScript30@master/01%20-%20JavaScript%20Drum%20Kit/sounds/tom.wav'
        };
        const drumBuffers = {};
        let isDrumKitLoaded = false;

        async function loadDrumKit() {
            if (!isAudioInit) initAudioEngine();
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            if (isDrumKitLoaded) return;
            
            setStatus('Baixando bateria...', 'loading');
            try {
                const promises = Object.entries(drumSamplesURLs).map(async ([name, url]) => {
                    const response = await fetch(url);
                    drumBuffers[name] = await audioCtx.decodeAudioData(await response.arrayBuffer());
                });
                await Promise.all(promises);
                isDrumKitLoaded = true;
                setStatus('Pronto', 'ok');
            } catch (e) {
                console.error(e);
                setStatus('Erro ao carregar bateria', 'error');
            }
        }

        async function loadSoundfont(progNum, layer = 1) {
            if (!isAudioInit) initAudioEngine();
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            
            setStatus(`Carregando L${layer}: ${gmInstruments[progNum] || 'Bateria'}...`, 'loading');
            try {
                // Direcionamos a saída do Soundfont diretamente para o nosso MasterGain (para o Reverb funcionar)
                const inst = await Soundfont.instrument(audioCtx, sfNames[progNum], { soundfont: 'MusyngKite', destination: masterGain });
                if (layer === 1) sfInst1 = inst;
                if (layer === 2) sfInst2 = inst;
                setStatus('Timbre Carregado', 'ok');
            } catch (e) {
                console.error(e);
                setStatus('Erro no Timbre', 'error');
            }
        }


        // --- 3. INICIALIZAÇÃO DA INTERFACE ---
        function populateInstrumentSelects() {
            const sel1 = document.getElementById('instrument-select-1');
            const sel2 = document.getElementById('instrument-select-2');
            let html = '';
            
            gmInstruments.forEach((inst, index) => {
                html += `<option value="${index}">${String(index + 1).padStart(3, '0')} - ${inst}</option>`;
            });
            html += `<option disabled>────────── BATERIAS ──────────</option>`;
            drumKits.forEach((kit, index) => {
                html += `<option value="${128 + index}">Kit - ${kit.name}</option>`;
            });

            sel1.innerHTML = html; sel2.innerHTML = html;
            sel1.value = 0; // Grand Piano
            sel2.value = 48; // Strings
        }
        populateInstrumentSelects();

        // Tratadores de Mudança de Instrumento
        function handleProgramChange(val, layer) {
            let chIdx, prog;
            if (val < 128) {
                chIdx = layer === 1 ? 0 : 1; // Ch1 ou Ch2
                prog = val;
            } else {
                chIdx = layer === 1 ? 9 : 10; // Ch10 ou Ch11
                prog = drumKits[val - 128].pc;
            }

            if (layer === 1) { currentChannel1 = chIdx; currentProgram1 = prog; }
            else { currentChannel2 = chIdx; currentProgram2 = prog; }

            changeMidiProgram(prog, chIdx);
            
            if (!outputPort) {
                if (chIdx === 9 || chIdx === 10) loadDrumKit();
                else loadSoundfont(prog, layer);
            }
        }

        document.getElementById('instrument-select-1').addEventListener('change', (e) => handleProgramChange(parseInt(e.target.value), 1));
        document.getElementById('instrument-select-2').addEventListener('change', (e) => {
            if(isLayer2Enabled) handleProgramChange(parseInt(e.target.value), 2);
        });

        // Toggle Layer 2
        document.getElementById('layer2-toggle').addEventListener('change', (e) => {
            isLayer2Enabled = e.target.checked;
            const sel2 = document.getElementById('instrument-select-2');
            if (isLayer2Enabled) {
                sel2.disabled = false;
                sel2.classList.remove('opacity-50', 'pointer-events-none');
                handleProgramChange(parseInt(sel2.value), 2);
            } else {
                sel2.disabled = true;
                sel2.classList.add('opacity-50', 'pointer-events-none');
            }
        });

        // Renderização do Piano
        const pianoContainer = document.getElementById('piano');
        let pianoHTML = '';
        for (let i = startNote; i <= endNote; i++) {
            const isBlack = [1, 3, 6, 8, 10].includes(i % 12);
            if (!isBlack) {
                const nextIsBlack = [1, 3, 6, 8, 10].includes((i + 1) % 12);
                let blackHTML = '';
                if (nextIsBlack && (i + 1) <= endNote) {
                     blackHTML = `<div class="key black" data-note="${i+1}"></div>`;
                }
                pianoHTML += `<div class="relative flex-none">
                    <div class="key white" data-note="${i}"><span class="absolute bottom-4 w-full text-center text-xs opacity-50 text-slate-600 font-bold"></span></div>
                    ${blackHTML}
                </div>`;
            }
        }
        pianoContainer.innerHTML = pianoHTML;

        function updateLabels() {
            document.querySelectorAll('.key').forEach(keyEl => {
                const note = parseInt(keyEl.dataset.note);
                const baseNote = (currentOctave + 1) * 12;
                let label = '';
                for (const [key, offset] of Object.entries(keyMap)) {
                    if (baseNote + offset === note) label = key.replace(/Key|Digit|Comma|Period|Slash|Semicolon/g, '');
                }
                const span = keyEl.querySelector('span');
                if (span) span.textContent = label;
            });
            document.getElementById('oct-display').textContent = currentOctave;
        }
        updateLabels();
        setTimeout(() => { const c = document.querySelector('.key[data-note="60"]'); if(c) c.scrollIntoView({ inline: 'center' }); }, 300);

        document.getElementById('oct-up').addEventListener('click', () => { if (currentOctave < 7) { currentOctave++; updateLabels(); }});
        document.getElementById('oct-down').addEventListener('click', () => { if (currentOctave > 1) { currentOctave--; updateLabels(); }});


        // --- 4. ENGINE DE SÍNTESE E MIDI ---
        function setStatus(msg, state) {
            document.getElementById('status-text').textContent = msg;
            document.getElementById('status-dot').className = 'w-3.5 h-3.5 rounded-full ' + (state === 'ok' ? 'bg-emerald-500' : state === 'error' ? 'bg-red-500' : 'bg-yellow-500 animate-pulse');
        }

        async function initMIDI() {
            if (navigator.requestMIDIAccess) {
                try {
                    midiAccess = await navigator.requestMIDIAccess();
                    updateDevices();
                    midiAccess.onstatechange = updateDevices;
                } catch (err) { setStatus('MIDI bloqueado. Clique no teclado para iniciar o Áudio Web.', 'error'); }
            } else { setStatus('Navegador não suporta Web MIDI.', 'error'); }
        }

        function updateDevices() {
            const selectIn = document.getElementById('midi-in-select');
            const selectOut = document.getElementById('midi-out-select');
            const currIn = selectIn.value; const currOut = selectOut.value;
            
            selectIn.innerHTML = '<option value="">Nenhum / Apenas QWERTY</option>';
            selectOut.innerHTML = '<option value="web-synth">Sintetizador Web (Padrão)</option>';
            
            for (let input of midiAccess.inputs.values()) {
                const opt = document.createElement('option'); opt.value = input.id; opt.text = input.name;
                selectIn.appendChild(opt);
                if (currIn === input.id) { opt.selected = true; inputPort = input; inputPort.onmidimessage = onMidiMessage; }
            }
            if(!currIn && midiAccess.inputs.size > 0) { // Auto-conecta o primeiro
                inputPort = midiAccess.inputs.values().next().value;
                inputPort.onmidimessage = onMidiMessage;
                selectIn.value = inputPort.id;
            }
            
            for (let output of midiAccess.outputs.values()) {
                const opt = document.createElement('option'); opt.value = output.id; opt.text = output.name;
                selectOut.appendChild(opt);
                if (currOut === output.id) { opt.selected = true; outputPort = output; }
            }
            setStatus('MIDI Pronto', 'ok');
        }

        document.getElementById('midi-out-select').addEventListener('change', (e) => {
            if (e.target.value === 'web-synth') {
                outputPort = null;
                // Carrega áudio web ao voltar pro synth
                handleProgramChange(parseInt(document.getElementById('instrument-select-1').value), 1);
                if(isLayer2Enabled) handleProgramChange(parseInt(document.getElementById('instrument-select-2').value), 2);
            } else {
                outputPort = midiAccess.outputs.get(e.target.value);
                changeMidiProgram(currentProgram1, currentChannel1);
                if(isLayer2Enabled) changeMidiProgram(currentProgram2, currentChannel2);
            }
        });

        document.getElementById('midi-in-select').addEventListener('change', (e) => {
            if (inputPort) inputPort.onmidimessage = null;
            inputPort = e.target.value ? midiAccess.inputs.get(e.target.value) : null;
            if (inputPort) inputPort.onmidimessage = onMidiMessage;
        });

        function onMidiMessage(msg) {
            const [status, note, velocity] = msg.data;
            const cmd = status >> 4;
            if (cmd === 9 && velocity > 0) {
                playNote(note, velocity);
            } else if (cmd === 8 || (cmd === 9 && velocity === 0)) {
                stopNote(note);
            }
        }

        // --- 5. LOGICA DE PLAY E LAYER ---

        function playWebDrum(note, velocity, channel) {
            if (!isAudioInit || audioCtx.state === 'suspended') return;
            // Velocity scaling (0.0 to 1.5 multiplier)
            const vol = (velocity / 127) * 1.5; 
            
            // Lógica Simplificada para Standard Kit
            let bufferName = 'tink'; let rate = 1.0;
            switch(note) {
                case 35: case 36: bufferName = 'kick'; break;
                case 38: case 40: bufferName = 'snare'; break;
                case 42: case 44: bufferName = 'hihat'; break;
                case 46: bufferName = 'openhat'; break;
                case 49: case 55: case 57: bufferName = 'crash'; break;
                case 51: case 53: case 59: bufferName = 'ride'; break;
                case 41: case 43: case 45: case 47: case 48: case 50:
                    bufferName = 'tom'; rate = 0.6 + ((note - 41) * 0.08); break;
            }

            if (drumBuffers[bufferName]) {
                const src = audioCtx.createBufferSource();
                src.buffer = drumBuffers[bufferName];
                src.playbackRate.value = rate;
                const gain = audioCtx.createGain();
                gain.gain.value = vol;
                src.connect(gain);
                gain.connect(masterGain); // Vai pro Reverb
                src.start(0);
            }
        }

        // Função Principal de Disparo (Recebe Nota e Velocity)
        function playNote(note, velocity = 90) { // Velocity Padrão 90 se vier do Mouse
            if (!isAudioInit) initAudioEngine();
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

            // Transformação Velocity -> Gain (Curva levemente quadrática para maior expressividade)
            const gainVal = Math.pow(velocity / 127, 1.5) * 1.5;

            if (outputPort) {
                // Layer 1 MIDI OUT
                outputPort.send([0x90 + currentChannel1, note, velocity]);
                // Layer 2 MIDI OUT
                if (isLayer2Enabled) outputPort.send([0x90 + currentChannel2, note, velocity]);
            } else {
                // Layer 1 WEB SYNTH
                if (currentChannel1 === 9 || currentChannel1 === 10) playWebDrum(note, velocity, 1);
                else if (sfInst1) activeSfNotes1[note] = sfInst1.play(note, audioCtx.currentTime, { gain: gainVal });
                
                // Layer 2 WEB SYNTH
                if (isLayer2Enabled) {
                    if (currentChannel2 === 9 || currentChannel2 === 10) playWebDrum(note, velocity, 2);
                    else if (sfInst2) activeSfNotes2[note] = sfInst2.play(note, audioCtx.currentTime, { gain: gainVal });
                }
            }

            const keyEl = document.querySelector(`.key[data-note="${note}"]`);
            if (keyEl) keyEl.classList.add('active');
        }

        function stopNote(note) {
            if (outputPort) {
                outputPort.send([0x80 + currentChannel1, note, 0]);
                if (isLayer2Enabled) outputPort.send([0x80 + currentChannel2, note, 0]);
            } else {
                if (activeSfNotes1[note]) { activeSfNotes1[note].stop(audioCtx.currentTime + 0.1); delete activeSfNotes1[note]; }
                if (activeSfNotes2[note]) { activeSfNotes2[note].stop(audioCtx.currentTime + 0.1); delete activeSfNotes2[note]; }
            }
            const keyEl = document.querySelector(`.key[data-note="${note}"]`);
            if (keyEl) keyEl.classList.remove('active');
        }

        function changeMidiProgram(prog, channelIndex) {
            if (outputPort) outputPort.send([0xC0 + channelIndex, prog]);
        }

        // --- 6. INTERAÇÃO (MOUSE E TECLADO) ---
        let isMouseDown = false;
        let currentMouseNote = null;

        pianoContainer.addEventListener('mousedown', (e) => {
            isMouseDown = true;
            const key = e.target.closest('.key');
            if (key) { currentMouseNote = parseInt(key.dataset.note); playNote(currentMouseNote, 100); }
        });
        pianoContainer.addEventListener('mouseover', (e) => {
            if (!isMouseDown) return;
            const key = e.target.closest('.key');
            if (key) {
                const note = parseInt(key.dataset.note);
                if (note !== currentMouseNote) {
                    if (currentMouseNote !== null) stopNote(currentMouseNote);
                    playNote(note, 100); currentMouseNote = note;
                }
            }
        });
        window.addEventListener('mouseup', () => {
            isMouseDown = false;
            if (currentMouseNote !== null) { stopNote(currentMouseNote); currentMouseNote = null; }
        });

        const activePCNotes = new Map();
        window.addEventListener('keydown', (e) => {
            if (e.repeat || ['INPUT', 'SELECT'].includes(e.target.tagName)) return;
            const offset = keyMap[e.code];
            if (offset !== undefined) {
                const note = (currentOctave + 1) * 12 + offset;
                if (note >= startNote && note <= endNote) { playNote(note, 90); activePCNotes.set(e.code, note); }
            }
        });
        window.addEventListener('keyup', (e) => {
            if (activePCNotes.has(e.code)) { stopNote(activePCNotes.get(e.code)); activePCNotes.delete(e.code); }
        });

        // Tenta iniciar a requisição MIDI
        initMIDI();
    </script>
</body>
</html>
